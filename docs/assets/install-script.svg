<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Vclaw install flow</title>
  <desc id="desc">A simple Vclaw install card with a red ant logo and GitHub installer commands.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f232b" />
      <stop offset="100%" stop-color="#12151b" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" rx="28" fill="url(#bg)" />
  <rect x="56" y="56" width="1168" height="608" rx="24" fill="#171b22" stroke="#2a313d" stroke-width="2" />
  <circle cx="102" cy="102" r="10" fill="#ff5f57" />
  <circle cx="136" cy="102" r="10" fill="#febc2e" />
  <circle cx="170" cy="102" r="10" fill="#28c840" />
  <text x="104" y="184" fill="#ff4d4d" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji, sans-serif" font-size="54">🐜</text>
  <text x="170" y="184" fill="#ff4d4d" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="700">Vclaw install</text>
  <text x="104" y="230" fill="#97a3b6" font-family="Segoe UI, Arial, sans-serif" font-size="28">Simple GitHub setup. Install first, onboard second, keep the gateway running.</text>

  <rect x="96" y="282" width="1088" height="132" rx="18" fill="#10141a" stroke="#28303b" />
  <text x="126" y="326" fill="#ff7a7a" font-family="Consolas, Menlo, monospace" font-size="24">macOS / Linux</text>
  <text x="126" y="372" fill="#d7dde7" font-family="Consolas, Menlo, monospace" font-size="26">curl -fsSL https://raw.githubusercontent.com/zylzyqzz/Vclaw/main/scripts/install.sh | bash</text>

  <rect x="96" y="440" width="1088" height="156" rx="18" fill="#10141a" stroke="#28303b" />
  <text x="126" y="484" fill="#ff7a7a" font-family="Consolas, Menlo, monospace" font-size="24">Windows (PowerShell)</text>
  <text x="126" y="530" fill="#d7dde7" font-family="Consolas, Menlo, monospace" font-size="22">powershell -ExecutionPolicy Bypass -Command "&amp; ([scriptblock]::Create((irm</text>
  <text x="126" y="564" fill="#d7dde7" font-family="Consolas, Menlo, monospace" font-size="22">https://raw.githubusercontent.com/zylzyqzz/Vclaw/main/scripts/install.ps1)))"</text>

  <text x="104" y="642" fill="#97a3b6" font-family="Segoe UI, Arial, sans-serif" font-size="24">Next: vclaw onboard  •  vclaw gateway install  •  vclaw gateway start</text>
</svg>
